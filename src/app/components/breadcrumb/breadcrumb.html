<div class="w-full">
  
  <span class="hover:cursor-pointer" routerLink="/users" > 
    Users 
  </span>

  @if(currentPath().includes('/users/edit') && currentPath() !== '/users'){
  <span routerLink="edit" routerLinkActive="font-bold">
    > Edit
  </span>
  }
  @if(currentPath().includes('/users/add') && currentPath() !== '/users'){
  <span routerLink="add" routerLinkActive="font-bold">
    > Add
  </span>
  }


  
</div>
