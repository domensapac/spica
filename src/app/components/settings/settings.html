<div class="flex flex-col justify-center items-center h-full p-10 ">
  <div class="w-1/2 p-10 border-1 border-slate-200 shadow-sm">
    <div class="flex justify-center p-4 text-center overflow-hidden">
      <p class="text-lg mb-3">
        {{ auth.token() ? 'Token is saved!' : 'Authorize to receive token.' }}
      </p>
    </div>
    <form class="!flex !flex-col !gap-4" #f="ngForm" (ngSubmit)="saveSettings()">
      <div class="flex flex-col">
        <label>
          clientId
        </label>
        <input type="text" class="border-1 border-slate-200 rounded-sm p-1" name="client_id" [(ngModel)]="client_id">
      </div>
      <div class="flex flex-col">
      <label>
        clientSecret
      </label>
      <input type="password" class="border-1 border-slate-200 rounded-sm p-1" name="client_secret" [(ngModel)]="client_secret">
      </div>
      <div class="flex justify-center">
        <button class="text-white hover:cursor-pointer h-10 px-4 border border-slate-300 bg-rose-400 rounded-md transition flex items-center text-md font-semibold shadow-sm" type="submit">Submit</button>
      </div>
    </form>
  </div>
</div>
