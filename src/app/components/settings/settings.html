<div class="flex flex-col justify-center items-center h-full p-10 ">
  <div class="p-10 border-1 border-slate-200 shadow-sm">
    <form class="!flex !flex-col !gap-4" #f="ngForm" (ngSubmit)="saveSettings()">
      <div class="flex flex-col">
        <label>
          clientId
        </label>
        <input type="text" class="border-1 border-slate-200 rounded-sm p-1" name="client_id" [(ngModel)]="client_id">
      </div>
      <div class="flex flex-col">
      <label>
        clientSecret
      </label>
      <input type="text" class="border-1 border-slate-200 rounded-sm p-1" name="client_secret" [(ngModel)]="client_secret">
      </div>
      <button class="border-1" type="submit">Submit</button>

    </form>
    <div class="mt-6 p-4 bg-gray-100 rounded text-left border overflow-hidden">
      <p class="font-mono text-sm break-all">
        <strong>Token:</strong> 
        {{ auth.token() ? auth.token() : 'Žetona še ni. Klikni gumb!' }}
      </p>
    </div>
  </div>
</div>
