
<form class="!flex !flex-col !gap-2" #f="ngForm" (ngSubmit)="onSubmit()">
    <label>
    Name:
    <input name="FirstName" [(ngModel)]="name" placeholder="Enter your name">
    </label>
    <label>
    Last name:
    <input name="LastName" [(ngModel)]="name" placeholder="Enter your name">
    </label>
    <label>
    Email:
    <input name="email" [(ngModel)]="name" placeholder="Enter your email">
    </label>
    <button type="submit">Submit</button>
</form>
<p *ngIf="submitted">Submitted!</p>
